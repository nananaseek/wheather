<div class="p-4 max-w-sm mx-auto bg-gray-50 rounded-xl shadow-md space-y-4 w-full h-full m-1">
    <h2 class="text-xl font-bold text-gray-800">Ваші міста</h2>

    @if (apiService.isLoading$ | async) {

    <div class="flex flex-col items-center justify-center py-12 my-auto gap-3">
        <div class="w-8 h-8 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
        <p class="text-sm text-gray-400 animate-pulse">Завантаження міст...</p>
    </div>

    } @else {

    @if ((apiService.cities$ | async); as cityList) {

    @if (cityList.length > 0) {

    <div class="flex flex-col gap-2">
        @for (city of cityList; track city.id) {
        <app-city-button [cityData]="city"></app-city-button>
        }
    </div>
    <div class="p-2"></div>
    <app-city-button-create></app-city-button-create>

    } @else {

    <div class="text-center p-4 border-2 border-dashed border-gray-300 rounded-lg">
        <p class="text-gray-500 text-sm mb-3">У вас ще немає доданих міст.</p>
        <app-city-button-create></app-city-button-create>
    </div>

    }

    } @else {
    <p class="text-center text-gray-400 animate-pulse">Завантаження списку міст...</p>
    }
    }
</div>
