<button (click)="selectThisCity()"
    class="group w-full bg-white hover:bg-slate-50 text-gray-800 font-semibold py-2.5 px-4 border border-gray-200 rounded-xl shadow-xs transition-all duration-200 flex items-center justify-between gap-3 text-left">

    <span class="flex items-center gap-2 truncate">
        <span class="text-gray-400 group-hover:text-blue-500 transition-colors">📍</span>
        <span class="truncate">{{ cityName }}</span>
    </span>

    <button (click)="deleteThisCity($event)" type="button" title="Видалити місто"
        class="p-1.5 rounded-lg text-gray-400 hover:text-red-600 hover:bg-red-50 transition-all duration-200 cursor-pointer">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 6h18" />
            <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
            <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
        </svg>
    </button>

</button>
